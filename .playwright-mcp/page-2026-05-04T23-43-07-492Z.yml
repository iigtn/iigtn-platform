          - listitem [ref=e276]:
            - strong [ref=e277]: Anthropic Prompt Caching
            - text: ": 「設計書の章立てテンプレート」など固定プロンプトをキャッシュ。 入力コストを 90% 削減（Anthropic の SDK 標準機能）。"
          - listitem [ref=e278]:
            - strong [ref=e279]: BYOK プラン併設
            - text: ": 法人 Business で「自社の API キーを持ち込む」プランを用意し、原価ゼロ運用も可能に。"
          - listitem [ref=e280]:
            - strong [ref=e281]: OpenRouter 経由
            - text: ": ルーティングコスト 5〜15% 削減 + フェイルオーバー対応（OpenAI 障害時に Anthropic へ自動切替）。"
        - generic [ref=e282]:
