      - heading "DocChain — SI 業界向け 設計書連鎖生成 AI（LP）" [level=1] [ref=e21]
      - paragraph [ref=e22]:
        - code [ref=e23]: getdocchain.com
        - text: は、上流工程 (要件定義書) から下流工程 (基本設計書 → 詳細設計書 → テスト仕様書) を AI が自動生成する SaaS の Landing Page。事前登録を受け付ける LP を AWS サーバレスで構築し、ベータ提供 (2026/9 予定) に向けて開発中です。本体は OpenAI / Anthropic API のカスケード + Prompt Caching で API 原価 89% 削減を狙う設計です。
