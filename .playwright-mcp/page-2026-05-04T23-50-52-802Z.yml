      - generic [ref=e62]:
        - heading "A. なぜグランピング特化か" [level=2] [ref=e63]
        - list [ref=e64]:
          - listitem [ref=e65]:
            - strong [ref=e66]: 一般キャンプ場のみだと収益薄い
            - text: ": 楽天/じゃらんアフィリ報酬率 1〜2%、1 泊 ¥5,000〜10,000 × 1% で CV 単価 ¥50〜100。月数百件でも月収 ¥5 万円程度に頭打ち。"
          - listitem [ref=e67]:
            - strong [ref=e68]: グランピング特化なら高単価
            - text: ": 1 泊 ¥20,000〜50,000 × 1.5% で CV 単価 ¥300〜750。独自プログラムなら 5〜10% で ¥1,000〜5,000。月 50 件で月収 ¥5〜25 万円。"
          - listitem [ref=e69]:
            - strong [ref=e70]: 市場の追い風
            - text: ": コロナ後の継続需要、ファミリー / カップル層の拡大、インバウンド需要、まだ大手寡占ではない。"
          - listitem [ref=e71]:
            - strong [ref=e72]: ハイブリッド戦略
            - text: ": グランピング (高単価) + 一般キャンプ場 (ロングテール集客) で複合収益化。"
