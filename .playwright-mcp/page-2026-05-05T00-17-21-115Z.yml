      - paragraph [ref=e20]: プロジェクト解説 · 構想中（立ち上げ準備中）
      - heading "グランピング × キャンプ場マップ" [level=1] [ref=e21]
      - paragraph [ref=e22]: 日本全国のグランピング施設・キャンプ場を地図 UI で可視化し、予約サイトへ送客するアフィリエイトメディアの 構成計画です。グランピング (高単価) を主軸にしつつ、一般キャンプ場 (数勝負) も網羅。 子育てマップと技術基盤を共通化する想定で、Next.js (Static Export) + S3 + CloudFront + DynamoDB + Lambda の AWS サーバレス構成を設計済みです。
