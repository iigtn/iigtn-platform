      - heading "子育てマップ — 保活＋学区＋学童＋塾の統合可視化" [level=1] [ref=e21]
      - paragraph [ref=e22]: 30〜40 代の子育て世代向けに、保育園・学校・学童・塾・住宅情報を地図 UI で一括可視化する 地理データ可視化メディアの構成計画です。ライフステージに応じて長期間（5〜10 年）使われるサイトを目指し、 同一ドメインのサブディレクトリ展開で保活 → 学区 → 学童 → 塾と段階的に拡張します。
