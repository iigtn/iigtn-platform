            - text: ―
            - code [ref=e179]: sources.yaml
            - text: 追加時に Lambda の環境変数で
            - code [ref=e180]: DRY_RUN=true
            - text: を立て、DynamoDB に書き込まずログだけ確認。
          - listitem [ref=e181]:
            - strong [ref=e182]: CodeBuild の差分 sync
            - text: ―
            - code [ref=e183]: aws s3 sync --delete
            - text: で 4,500 ページの差分のみアップロード、CloudFront
            - code [ref=e184]: /*
