            - text: （UTC 18:00 = JST 03:00）で
            - strong [ref=e99]: CodeBuild
            - text: を起動。
          - listitem [ref=e100]:
            - text: CodeBuild が
            - code [ref=e101]: iigtn/hojokin-db
            - text: リポジトリを
            - code [ref=e102]: git clone
            - text: 、依存をインストール、
            - code [ref=e103]: scripts/export-data.ts
            - text: で
            - strong [ref=e104]: DynamoDB → JSON
            - text: エクスポート。
          - listitem [ref=e105]:
            - code [ref=e106]: next build
            - text: （App Router の
            - code [ref=e107]: "output: \"export\""
            - text: ）で
            - strong [ref=e108]: 4,500 ページ予定
            - text: の SSG を生成。
          - listitem [ref=e109]:
            - code [ref=e110]: aws s3 sync
            - text: で S3 に同期 → CloudFront を invalidate。
        - paragraph [ref=e111]: SSG（静的サイト生成）にしているため、訪問者リクエストごとに DB を引かない設計です。 CloudFront のキャッシュだけで応答が返るので、月数百円のコストで配信できます。
