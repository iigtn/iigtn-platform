      - generic [ref=e63]:
        - heading "A. 訪問者の閲覧フロー" [level=2] [ref=e64]
        - list [ref=e65]:
          - listitem [ref=e66]:
            - strong [ref=e67]: DNS
            - text: ― Squarespace で管理する
            - code [ref=e68]: iigtn.com
            - text: の DNS に
            - code [ref=e69]: hojokin
            - text: の CNAME を仕込み、CloudFront へ向けています。
          - listitem [ref=e70]:
            - strong [ref=e71]: CloudFront
            - text: ― TLS 終端 + 静的キャッシュ。
            - code [ref=e72]: "*.iigtn.com"
            - text: の ACM 証明書（us-east-1）を関連付け。
          - listitem [ref=e73]:
            - strong [ref=e74]: S3 (private)
            - text: ― 静的サイトと
            - code [ref=e75]: /data/*.json
            - text: を配置。Public Access Block を全 true にして、Origin Access Control 経由でしか読めない構造に。
        - paragraph [ref=e76]: S3 への直アクセスは構造的にできないので、誤ってバケットに上がった機密データが漏れる心配がない、というのが採用理由です。
      - generic [ref=e77]:
        - heading "B. 毎日 02:00 JST — クローラ & AI 整形" [level=2] [ref=e78]
        - list [ref=e79]:
          - listitem [ref=e80]:
            - strong [ref=e81]: EventBridge
            - text: が
            - code [ref=e82]: cron(0 17 * * ? *)
            - text: （UTC 17:00 = JST 02:00）で発火し、Lambda を起動します。
          - listitem [ref=e83]:
            - strong [ref=e84]: Lambda (Python 3.13)
            - text: が
            - code [ref=e85]: sources.yaml
            - text: に定義した一次ソース（J-Net21 / ミラサポplus / 自治体ページ）を巡回。
          - listitem [ref=e86]:
            - text: 取得した HTML を
            - strong [ref=e87]: Amazon Bedrock (Claude Sonnet 4.6)
            - text: に渡し、補助金タイトル・対象業種・地域・締切などを構造化 JSON として抽出。
          - listitem [ref=e88]:
            - text: 結果を
            - strong [ref=e89]: DynamoDB
            - text: （
            - code [ref=e90]: subsidies
            - text: テーブル + GSI ×3）に
            - code [ref=e91]: put_item
            - text: 。重複は PK で吸収。
        - paragraph [ref=e92]: AI 整形を Bedrock + IAM だけで完結させているので、API キー文字列をどこにも置かない運用です（OpenAI 等の外部 API を使う場合に発生するキー管理コストがゼロ）。
      - generic [ref=e93]:
