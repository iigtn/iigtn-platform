            - text: +
            - code [ref=e247]: "*.hojinka.com"
            - text: をカバーする ACM 証明書（us-east-1）を関連付け。
          - listitem [ref=e248]:
            - strong [ref=e249]: S3 (private)
            - text: ― 静的 HTML/CSS/JS/画像を配置。Public Access Block 全 true、CloudFront の Origin Access Control 経由でしか読めない構造。
        - paragraph [ref=e250]: S3 への直アクセスは構造的に不可。CloudFront 経由でのみ読める設計のため、誤アップロードによる 機密漏れリスクが小さい。
