      - paragraph [ref=e22]:
        - code [ref=e23]: hojinka.com
        - text: は、開業届・確定申告・案件獲得・法人化判断・会社設立・法人運営という、 フリーランスからマイクロ法人までのライフサイクルを 6 ステージで横断する比較メディアです。 法人化シミュレーターを Vanilla JS で実装し、税負担と社会保険料を試算可能。 静的サイトを AWS で配信、IaC + OIDC デプロイで運用しています。
