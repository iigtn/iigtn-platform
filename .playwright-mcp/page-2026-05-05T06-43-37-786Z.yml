      - heading "autoST — 自動売買リサーチ＆運用フレームワーク" [level=1] [ref=e21]
      - paragraph [ref=e22]: autoST は、日本株 / 米国 ETF を対象に自動売買戦略を検証・運用する個人研究プロジェクトです。 Lambda + EventBridge + DynamoDB + S3 を Terraform で IaC 化し、ローカル PC で kabu STATION API と連携。20 を超える戦略を AI 共同レビューでバックテストし、最終的に 1545（米国 S&P500 ETF） + 200 日 MA + 月次キャッシュ確定型に収束しました。コードは内部運用のため非公開です。
      - link "← Works に戻る" [ref=e24] [cursor=pointer]:
