      - generic [ref=e212]:
        - heading "A. 戦略の絞り込みプロセス（PDCA × AI 共同レビュー）" [level=2] [ref=e213]
        - paragraph [ref=e214]: 20 を超える候補戦略をバックテストし、AI 共同レビュー（ChatGPT との往復ディスカッション）で 弱点と過学習を指摘してもらいながら絞り込みました。
        - list [ref=e215]:
          - listitem [ref=e216]:
            - strong [ref=e217]: v1〜v5
            - text: ": 日本株のスキャル・スイング戦略（VWAP 平均回帰 / RSI 二峰 / 上方修正サプライズ等）。手数料・スリッページ込みで現実的なリターンが取れる戦略を探索。"
          - listitem [ref=e218]:
            - strong [ref=e219]: v6〜v10
            - text: ": morning_trader / event_pivot / 半自動運用への振替。kabu STATION の制約（取引時間・手数料体系）に合わせた最適化。"
          - listitem [ref=e220]:
            - strong [ref=e221]: v0.1〜v0.6 (スキャル PDCA)
            - text: ": VWAP / 出来高ブレイクの組合せ。スリッページ + 手数料込みで全パターン赤字 → スキャル戦略は廃止判断。"
          - listitem [ref=e222]:
            - strong [ref=e223]: v10〜v11
            - text: ": スイング 20 日高値ブレイク + イベント転換（上方修正の需給歪み）+ AI 判断層。月勝率と DD のトレードオフを再評価。"
          - listitem [ref=e224]:
            - strong [ref=e225]: 最終
            - text: ": 米国 ETF (1545) + 200 日 MA で月初 Buy / 月末 Sell の"
            - strong [ref=e226]: 月次 BuyHold
            - text: に収束。複雑さを増やしても勝率が上がらないことが実証されたため。
        - paragraph [ref=e227]: 「複雑さ ≠ 強さ」を実証したのが最大の学び。25 銘柄 + intraday 動的 exit のような高度な戦略を 5 周回しても、 単一 ETF + 200 日 MA + 月初/月末売買の方が長期成績は良かった。
      - generic [ref=e228]:
        - heading "B. 自動運転フロー（AWS サーバレス）" [level=2] [ref=e229]
        - list [ref=e230]:
          - listitem [ref=e231]:
            - strong [ref=e232]: EventBridge
            - text: ― JST 平日朝 8:45（米国時間夜 19:45）に発火 → 日次の前場前準備 Lambda を起動。
          - listitem [ref=e233]:
            - strong [ref=e234]: Lambda (data_collector)
            - text: ― Yahoo Finance や J-Quants API から株価・出来高・市場ステータスを取得 → S3 (
            - code [ref=e235]: autoST-cache
            - text: ) に Parquet で保存。
          - listitem [ref=e236]:
            - strong [ref=e237]: Lambda (strategy_runner)
            - text: ― S3 から最新データを読み、200 日 MA / シグナル / ポジション状態を計算 → DynamoDB (
            - code [ref=e238]: autoST-positions
            - text: ) に書き戻し。
          - listitem [ref=e239]:
            - strong [ref=e240]: Lambda (paper_trader)
            - text: ― 仮想ポートフォリオで売買シミュ → 累積損益をメール（SES）で配信。
          - listitem [ref=e241]:
            - strong [ref=e242]: ローカル PC (kabu STATION)
            - text: ― 実発注は kabu STATION の REST API 経由でローカル PC から実行（PC を起動しておく必要あり）。Lambda → ローカルへの通知は SQS / SNS Email を経由。
