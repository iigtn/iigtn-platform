        - heading "A. 手動運用フェーズ（現在）" [level=2] [ref=e212]
        - paragraph [ref=e213]: まず手動で運用フローを確立し、再現可能な手順書として整備するアプローチ。「自動化する前に、自動化すべき手順が 正しいか」を検証する目的です。
        - list [ref=e214]:
          - listitem [ref=e215]:
            - strong [ref=e216]: アカウント設計
            - text: ― ペルソナ・bio・固定ツイート・ヘッダー画像を 3 メディアごとに設計
          - listitem [ref=e217]:
            - strong [ref=e218]: プロフィール最適化
            - text: ― アバター 400px / ヘッダー light/dark の SVG → PNG レンダラを実装
          - listitem [ref=e219]:
            - strong [ref=e220]: 初期投稿
            - text: ― 1 アカウントあたり 5〜10 件の固定型ポストを下書き → 公開予約
          - listitem [ref=e221]:
            - strong [ref=e222]: 投稿スケジューリング
            - text: ― X 公式 UI の予約投稿で平日朝 / 夜のスロットに割り当て
          - listitem [ref=e223]:
            - strong [ref=e224]: ハッシュタグ戦略
            - text: ― 補助金 / 法人化 / AWS / Terraform / インフラ関連のタグで実験 → 反応率を計測
        - paragraph [ref=e225]: 各ステップを 60 枚超のスクリーンショットで記録し、「次に運用を引き継ぐ人 (or 自分自身) が再現できる」 粒度に整備。これがそのまま自動化フェーズの仕様書になります。
