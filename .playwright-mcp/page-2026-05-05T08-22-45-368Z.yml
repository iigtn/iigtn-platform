    - code [ref=e593]: "iigtn-platform/ ├── README.md # プロジェクト全体の概要 ├── LICENSE # MIT ├── .gitignore # node_modules / *.tfstate / .env を除外 ├── .terraform-version # tfenv 用 (1.10.3) ├── .tool-versions # asdf 用 (terraform 1.10.3, nodejs 20.18.1) │ ├── docs/ # 設計書 v5 (8 ファイル) │ ├── motivation.md # なぜこの構成にしたか │ ├── cost.md # コスト試算 │ ├── metrics.md # 実運用メトリクス計画 │ ├── runbook.md # 障害対応手順 │ ├── lessons.md # 失敗・反省・悩み │ ├── business.md # クライアント案件展開 │ ├── interview.md # 面接 Q&A │ ├── adr/ # アーキテクチャ判断記録 (空) │ └── postmortem/ # 障害ポストモーテム (空) │ ├── frontend/ # 静的サイトファイル │ ├── index.html # トップページ + 問い合わせフォーム │ └── learn.html # 本解説書 │ ├── backend/ # Lambda コード │ └── functions/ │ └── contact/ │ └── index.mjs # 問い合わせ処理 │ ├── terraform/ # IaC (Infrastructure as Code) │ ├── bootstrap/ # 手動で 1 回だけ実行する初期化 │ │ ├── README.md │ │ ├── setup.sh # bash 用 │ │ └── setup.ps1 # PowerShell 用 │ │ │ ├── modules/ # 再利用可能なモジュール 5 種 │ │ ├── network_dns/ # ACM 証明書発行 + DNS 検証待ち │ │ ├── frontend_cdn/ # S3 + CloudFront + OAC │ │ ├── backend_api/ # API GW + Lambda + DynamoDB │ │ ├── ci_oidc/ # GitHub OIDC + IAM Role │ │ └── observability/ # CloudWatch Alarms + SNS + Budgets │ │ │ └── envs/ │ └── prod/ # 本番環境 (lab.iigtn.com) │ ├── backend.tf # state を S3 に置く設定 │ ├── providers.tf # AWS provider 2 つ (default + us_east_1) │ ├── versions.tf # Terraform / provider バージョン │ ├── variables.tf # 本環境への入力変数 │ ├── terraform.tfvars # 入力変数の実値 │ ├── main.tf # モジュール呼び出し │ └── outputs.tf # apply 後に表示する値 │ └── .github/ └── workflows/ └── frontend-deploy.yml # main push → 自動デプロイ"
