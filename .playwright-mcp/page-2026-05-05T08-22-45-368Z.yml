    - heading "11. 運用上の知識" [level=2] [ref=e815]
    - heading "11-1. デプロイのテンプレ" [level=3] [ref=e816]
    - code [ref=e818]: "# 1. 編集 vim frontend/index.html # 2. ローカル確認 (お好みで) # - 静的なら python -m http.server 8000 # 3. push git add frontend/index.html git commit -m \"Update homepage copy\" git push # 4. GitHub Actions が自動デプロイ # 5. https://lab.iigtn.com/ でブラウザ確認"
    - heading "11-2. CloudFront キャッシュを手動で消したい時" [level=3] [ref=e819]
    - code [ref=e821]: aws cloudfront create-invalidation \ --distribution-id EXXXXXXXXXXXXX \ --paths "/*"
    - blockquote [ref=e822]:
      - code [ref=e823]: /*
      - text: 全体の無効化は CloudFront の月 1,000 paths 無料枠を消費する。日常的には個別 path を指定するのが安い。
    - heading "11-3. DynamoDB の問い合わせ内容を見る" [level=3] [ref=e824]
    - code [ref=e826]: aws dynamodb scan --table-name iigtn-lab-prod-contacts --max-items 10
    - heading "11-4. Lambda のログを見る" [level=3] [ref=e827]
    - code [ref=e829]: aws logs tail /aws/lambda/iigtn-lab-prod-contact --since 30m --follow
    - heading "11-5. Terraform で何かを変える時" [level=3] [ref=e830]
    - code [ref=e832]: "cd terraform/envs/prod # 1. .tf を編集 # 2. plan で何が変わるか確認 terraform plan # 3. 問題なければ apply terraform apply"
    - heading "11-6. 全部消して作り直したい時" [level=3] [ref=e833]
    - code [ref=e835]: "cd terraform/envs/prod # 全リソース削除 (state バケット・ロックは残る) terraform destroy # state バケット自体は手動削除 (rm -rf 注意)"
    - blockquote [ref=e836]:
      - code [ref=e837]: terraform destroy
      - text: は破壊的。S3 バケットの中身を消し、CloudFront を削除し、Distribution の URL も変わる。本番運用中は絶対に走らせないこと。
