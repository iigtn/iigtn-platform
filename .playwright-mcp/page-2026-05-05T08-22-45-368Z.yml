    - heading "6-1. backend.tf — Terraform の状態保存先" [level=3] [ref=e624]
    - code [ref=e626]: "terraform { backend \"s3\" { bucket = \"iigtn-tfstate-XXXXXXXXXXXX\" # bootstrap で作成 key = \"envs/prod/terraform.tfstate\" region = \"ap-northeast-1\" dynamodb_table = \"iigtn-tflock\" encrypt = true } }"
    - paragraph [ref=e627]:
      - text: 「terraform apply で何を作ったか」の記録 (
      - code [ref=e628]: tfstate
      - text: ) を S3 に置き、複数人が同時に apply しないよう DynamoDB でロックを取る構成。
    - heading "6-2. providers.tf — AWS プロバイダ 2 つ" [level=3] [ref=e629]
    - code [ref=e631]: "provider \"aws\" { region = var.region # default: ap-northeast-1 default_tags { tags = local.common_tags } } provider \"aws\" { alias = \"us_east_1\" region = \"us-east-1\" # CloudFront / ACM 用 default_tags { tags = local.common_tags } } locals { common_tags = { Project = \"iigtn\" Environment = \"prod\" ManagedBy = \"Terraform\" Repo = \"iigtn-platform\" } }"
    - paragraph [ref=e632]:
      - code [ref=e633]: default_tags
      - text: は「すべての AWS リソースに自動で付くタグ」。個別 resource にタグを書かなくて済むので DRY。
    - heading "6-3. variables.tf + terraform.tfvars — 入力" [level=3] [ref=e634]
    - code [ref=e636]: "# variables.tf variable \"domain_name\" { type = string } variable \"github_owner\" { type = string } variable \"ses_from\" { type = string; default = \"\" } variable \"ses_to\" { type = string; default = \"\" } variable \"alarm_email\" { type = string; default = \"\" } variable \"monthly_budget_usd\" { type = number; default = 10 } # ... # terraform.tfvars (実値) domain_name = \"lab.iigtn.com\" github_owner = \"iigtn\""
    - heading "6-4. main.tf — モジュール呼び出し" [level=3] [ref=e637]
    - code [ref=e639]: "data \"aws_caller_identity\" \"current\" {} # 自分のアカウント ID 取得 locals { web_bucket_name = \"iigtn-lab-web-prod-${data.aws_caller_identity.current.account_id}\" } module \"network_dns\" { source = \"../../modules/network_dns\" domain_name = var.domain_name providers = { aws = aws aws.us_east_1 = aws.us_east_1 } } module \"frontend_cdn\" { source = \"../../modules/frontend_cdn\" domain_name = var.domain_name certificate_arn = module.network_dns.certificate_arn bucket_name = local.web_bucket_name api_origin_domain_name = module.backend_api.api_endpoint_host providers = { aws = aws aws.us_east_1 = aws.us_east_1 } } module \"backend_api\" { source = \"../../modules/backend_api\" name_prefix = \"iigtn-lab-prod\" lambda_source_dir = \"${path.root}/../../../backend/functions/contact\" allowed_origin = \"https://${var.domain_name}\" ses_from = var.ses_from ses_to = var.ses_to } module \"ci_oidc\" { source = \"../../modules/ci_oidc\" github_owner = var.github_owner github_repo = var.github_repo allowed_branches = var.github_allowed_branches deploy_bucket_arn = module.frontend_cdn.bucket_arn cloudfront_distribution_arn = module.frontend_cdn.distribution_arn } module \"observability\" { source = \"../../modules/observability\" name_prefix = \"iigtn-lab-prod\" alarm_email = var.alarm_email lambda_function_name = module.backend_api.lambda_function_name api_id = module.backend_api.api_id cloudfront_distribution_id = module.frontend_cdn.distribution_id monthly_budget_usd = var.monthly_budget_usd }"
