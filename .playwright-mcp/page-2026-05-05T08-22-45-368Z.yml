    - heading "9. 「git push」が起きた時に何が動くか" [level=2] [ref=e700]
    - list [ref=e701]:
      - listitem [ref=e702]:
        - text: 開発者が
        - code [ref=e703]: frontend/index.html
        - text: を編集
      - listitem [ref=e704]:
        - code [ref=e705]: git add . && git commit && git push
      - listitem [ref=e706]: GitHub が main ブランチへの push を検知
      - listitem [ref=e707]:
        - code [ref=e708]: .github/workflows/frontend-deploy.yml
        - text: の
        - code [ref=e709]: on.push.paths
        - text: がマッチ → ワークフロー起動
      - listitem [ref=e710]: Ubuntu Runner が起動 (約 5 秒)
      - listitem [ref=e711]:
        - strong [ref=e712]: actions/checkout@v4
        - text: がリポジトリをダウンロード
      - listitem [ref=e713]:
        - strong [ref=e714]: aws-actions/configure-aws-credentials@v4
        - text: ":"
        - list [ref=e715]:
          - listitem [ref=e716]: GitHub Actions に OIDC token を発行依頼
          - listitem [ref=e717]:
            - text: JWT の
            - code [ref=e718]: sub
            - text: claim には
            - code [ref=e719]: repo:iigtn/iigtn-platform:ref:refs/heads/main
          - listitem [ref=e720]: JWT を AWS STS に提示して AssumeRoleWithWebIdentity
          - listitem [ref=e721]: AWS STS が IAM Role の Trust Policy で sub を検証 → 一致 → 一時認証発行
          - listitem [ref=e722]:
            - text: Runner の env に
            - code [ref=e723]: AWS_ACCESS_KEY_ID
            - text: /
            - code [ref=e724]: AWS_SECRET_ACCESS_KEY
            - text: /
            - code [ref=e725]: AWS_SESSION_TOKEN
            - text: 注入 (1h 有効)
      - listitem [ref=e726]:
        - strong [ref=e727]: aws sts get-caller-identity
        - text: で確認 (デバッグ用)
      - listitem [ref=e728]:
        - strong [ref=e729]: aws s3 sync ./frontend/ s3://...
        - text: ":"
        - list [ref=e730]:
          - listitem [ref=e731]: frontend/ 内のファイルと S3 バケットの差分を計算
          - listitem [ref=e732]: 変更された / 新しいファイルだけ PUT
          - listitem [ref=e733]:
            - code [ref=e734]: "--delete"
            - text: で S3 にあってローカルに無いファイルを削除
      - listitem [ref=e735]:
        - strong [ref=e736]: aws cloudfront create-invalidation
        - text: ":"
        - list [ref=e737]:
          - listitem [ref=e738]:
            - text: Distribution の Edge キャッシュから
            - code [ref=e739]: /index.html
            - text: と
            - code [ref=e740]: /
            - text: を削除
          - listitem [ref=e741]: 次のアクセスで Origin (S3) から再取得
          - listitem [ref=e742]:
            - code [ref=e743]: aws cloudfront wait
            - text: で完了まで待機
      - listitem [ref=e744]:
        - strong [ref=e745]: curl -sI https://lab.iigtn.com/
        - text: で HTTP 200 を確認
      - listitem [ref=e746]: OIDC で取得した一時認証は使い捨て (1h 後に自動失効)
    - blockquote [ref=e747]:
      - text: "ポイント:"
      - strong [ref=e748]: AWS のアクセスキーは GitHub にも Runner にも永続的に保存されない
      - text: 。漏れたら困るキーを「最初から発行しない」設計。
