    - list [ref=e62]:
      - listitem [ref=e63]:
        - strong [ref=e64]: サーバレス（常駐サーバなし）
        - text: ": アクセスがない時は"
        - code [ref=e65]: 0 円
        - text: に近い課金。サーバの OS パッチや常時稼働の心配が不要。
      - listitem [ref=e66]:
        - strong [ref=e67]: すべて Terraform 管理
        - text: ": 100% コードで構成を記述しており、誰がいつ何を作ったかが Git 履歴に残る。同じ構成を複製・再構築できる。"
      - listitem [ref=e68]:
        - strong [ref=e69]: 静的キーレス CI/CD
        - text: ": GitHub に push したら自動デプロイ。AWS のアクセスキーを GitHub Secrets に置かない。"
