    - paragraph [ref=e60]:
      - text: このサイト
      - strong [ref=e61]: lab.iigtn.com
      - text: は、フリーランス・インフラエンジニアのポートフォリオ基盤として AWS 上に構築されたサーバレス構成のウェブサイトです。
