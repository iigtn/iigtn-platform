    - heading "7. CI/CD ワークフロー" [level=2] [ref=e651]
    - paragraph [ref=e652]:
      - text: GitHub Actions ワークフロー (
      - code [ref=e653]: .github/workflows/frontend-deploy.yml
      - text: ) は、main ブランチに push されたら自動的に S3 sync + CloudFront 無効化を実行します。
    - heading "ワークフロー全文" [level=3] [ref=e654]
    - code [ref=e656]: "name: frontend-deploy on: push: branches: [main] paths: - 'frontend/**' - '.github/workflows/frontend-deploy.yml' workflow_dispatch: {} permissions: id-token: write # OIDC token 発行に必須 contents: read # actions/checkout に必要 concurrency: group: frontend-deploy-${{ github.ref }} cancel-in-progress: true env: AWS_REGION: ap-northeast-1 AWS_ROLE_TO_ASSUME: arn:aws:iam::XXXXXXXXXXXX:role/iigtn-github-actions-deploy S3_BUCKET: iigtn-lab-web-prod-XXXXXXXXXXXX CF_DISTRIBUTION_ID: EXXXXXXXXXXXXX SITE_DIR: frontend FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' jobs: deploy: runs-on: ubuntu-latest timeout-minutes: 10 steps: - name: Checkout uses: actions/checkout@v4 - name: Configure AWS credentials (OIDC) uses: aws-actions/configure-aws-credentials@v4 with: role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }} role-session-name: gha-frontend-deploy-${{ github.run_id }} aws-region: ${{ env.AWS_REGION }} - name: Verify caller identity run: aws sts get-caller-identity - name: Deploy to S3 run: | aws s3 sync ./${{ env.SITE_DIR }}/ s3://${{ env.S3_BUCKET }}/ \\ --delete \\ --exclude \".git/*\" --exclude \"*.md\" --exclude \".gitignore\" - name: Invalidate CloudFront run: | INV_ID=$(aws cloudfront create-invalidation \\ --distribution-id ${{ env.CF_DISTRIBUTION_ID }} \\ --paths \"/index.html\" \"/\" \\ --query 'Invalidation.Id' --output text) aws cloudfront wait invalidation-completed \\ --distribution-id ${{ env.CF_DISTRIBUTION_ID }} \\ --id \"$INV_ID\" - name: Verify deployment run: curl -sI https://lab.iigtn.com/ | head -10"
