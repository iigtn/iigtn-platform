<?xml version="1.0" encoding="UTF-8"?>
<!--
  IIGTN icon — extracted from logo G, 64x64 square mark.
  Use for favicon, apple-touch-icon, PWA icons, SNS avatars.
  Palette: square fill = brand blue (#2a6acc), monogram = white.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="64" height="64"
     role="img" aria-label="iigtn">

  <!-- AWS-style rounded square in brand blue -->
  <rect x="0" y="0" width="64" height="64" rx="8" ry="8" fill="#2a6acc"/>

  <!-- inner mark in white: [i] -->
  <g fill="#ffffff">
    <!-- left bracket [ -->
    <path d="M 14,12 h 10 v 4 h -6 v 32 h 6 v 4 h -10 Z"/>
    <!-- right bracket ] -->
    <path d="M 50,12 h -10 v 4 h 6 v 32 h -6 v 4 h 10 Z"/>
    <!-- i : dot + stem -->
    <rect x="29" y="20" width="6" height="6"/>
    <rect x="29" y="30" width="6" height="18"/>
  </g>
</svg>
