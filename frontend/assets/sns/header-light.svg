<?xml version="1.0" encoding="UTF-8"?>
<!--
  iigtn X (Twitter) header — LIGHT theme.
  Canvas : 1500 x 500 (X recommended 3:1).
  Same composition as header-dark.svg; bg flipped to off-white
  with paper-grade neutral text, accent kept #2a6acc.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1500 500"
     width="1500" height="500"
     role="img"
     aria-label="iigtn — Serverless Infrastructure for AWS, Linux, Terraform">

  <rect width="1500" height="500" fill="#ffffff"/>

  <defs>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#e3e8ef"/>
    </pattern>
    <linearGradient id="rightFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="500" y="0" width="1000" height="500" fill="url(#dots)"/>
  <rect x="500" y="0" width="1000" height="500" fill="url(#rightFade)"/>

  <!-- vertical accent rule -->
  <rect x="0" y="170" width="6" height="160" fill="#2a6acc"/>

  <!-- ============ LOGO (270x64 source, scaled 4x to 1080x256) ============ -->
  <g transform="translate(90,130) scale(4)" color="#1f2937" fill="currentColor">
    <rect x="0" y="0" width="64" height="64" rx="8" ry="8" fill="#2a6acc"/>
    <g fill="#ffffff">
      <path d="M 14,12 h 10 v 4 h -6 v 32 h 6 v 4 h -10 Z"/>
      <path d="M 50,12 h -10 v 4 h 6 v 32 h -6 v 4 h 10 Z"/>
      <rect x="29" y="20" width="6" height="6"/>
      <rect x="29" y="30" width="6" height="18"/>
    </g>
    <rect x="98"  y="14" width="4"  height="4"/>
    <rect x="98"  y="24" width="4"  height="28"/>
    <rect x="130" y="14" width="4"  height="4"/>
    <rect x="130" y="24" width="4"  height="28"/>
    <path fill-rule="evenodd" d="
      M 178,38
      a 10,10 0 1 1 -20,0
      a 10,10 0 1 1  20,0
      Z
      M 174,38
      a 6,6 0 1 0 -12,0
      a 6,6 0 1 0  12,0
      Z"/>
    <rect x="174" y="28" width="4"  height="28"/>
    <rect x="160" y="52" width="18" height="4"/>
    <rect x="198" y="18" width="4"  height="34"/>
    <rect x="192" y="24" width="16" height="4"/>
    <rect x="202" y="48" width="8"  height="4"/>
    <rect x="226" y="24" width="4"  height="28"/>
    <rect x="226" y="24" width="20" height="4"/>
    <rect x="242" y="28" width="4"  height="24"/>
  </g>

  <g font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
     fill="#1f2937">
    <text x="1410" y="220" text-anchor="end" font-size="38" font-weight="600"
          letter-spacing="0.04em">
      Serverless Infrastructure
    </text>
    <text x="1410" y="270" text-anchor="end" font-size="22" font-weight="400"
          letter-spacing="0.18em" fill="#6b7280">
      AWS &#xb7; LINUX &#xb7; TERRAFORM
    </text>
    <text x="1410" y="320" text-anchor="end" font-size="18" font-weight="400"
          letter-spacing="0.05em" fill="#2a6acc">
      iigtn.com
    </text>
  </g>
</svg>
